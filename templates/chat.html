<!DOCTYPE html>
<html>

<head>

<title>AI Teaching Assistant</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

.container{
    width:70%;
    margin:40px auto;
}

h1{
    text-align:center;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    font-size:18px;
    box-sizing:border-box;
}

button{
    margin-top:20px;
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
}

.message{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,.1);
}

.user{
    color:#1565c0;
    font-weight:bold;
}

.ai{
    color:#2e7d32;
    font-weight:bold;
}

.error{
    color:red;
    font-weight:bold;
    margin-top:15px;
}

.source{
    margin-top:20px;
    background:#eef4ff;
    padding:15px;
    border-radius:8px;
}

.transcript{
    margin-top:10px;
    white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 AI Teaching Assistant</h1>

<form action="/chat" method="POST">

<textarea
name="question"
placeholder="Type your question here..."
required></textarea>

<br>

<button type="submit">
Ask
</button>

</form>

{% if question %}

<div class="message">

<p class="user">

👤 You

</p>

<p>

{{ question }}

</p>

<hr>

<p class="ai">

🤖 AI Teaching Assistant

</p>

{% if error %}

<p class="error">

{{ error }}

</p>

{% else %}

<p>

{{ answer }}

</p>

{% endif %}

<div class="source">

<b>📚 Source</b>

<br><br>

Lecture Number : {{ lecture }}

<br>

Start Time : {{ start }} sec

<br>

End Time : {{ end }} sec

<br><br>

<b>Transcript</b>

<div class="transcript">

{{ text }}

</div>

</div>

</div>

{% endif %}

</div>

</body>

</html>
